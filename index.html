<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell-App</title>
    <link
      rel="shortcut icon"
      href="./assets/icons/burger-icon.svg"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/food.css" />
    <link rel="stylesheet" href="./styles/basket.css" />
    <link rel="stylesheet" href="./styles/dialog.css" />
    <link rel="stylesheet" href="style.css" />

    <script src="./scripts/database.js"></script>
    <script src="scripts/templates.js"></script>
    <script src="./scripts/basket.js"></script>
    <script src="script.js"></script>
  </head>
  <body onload="init()">
    <header>
      <img src="./assets/icons/logo-bestellapp.svg" alt="Bestell-App-Logo" />
      <nav>
        <a href="#burger-section">Burger</a><a href="#pizza-section">Pizza</a
        ><a href="#salad-section">Salad</a>
      </nav>
      <img src="./assets/icons/menu-bar.svg" alt="Menü Bar" />
    </header>

    <main id="main">
      <section class="start">
        <!-- <img
          class="burger-logo"
          src="./assets/icons/burger-logo.png"
          alt="Burger-Logo"
        /> -->

        <section class="hero"></section>

        <section class="headline-section">
          <div class="headline-rating-container">
            <h1><span>Burger</span><span>House</span></h1>
            <div class="rating-box">
              <img src="./assets/icons/rating-star.svg" alt="star icon" />
              <p>4,1</p>
              <p>(317)</p>
            </div>
          </div>
          <p class="subtitle">
            The best of Burgers, Pizza, and Greens, all in one great place.
          </p>
        </section>
      </section>

      <div class="content-wrapper">
        <section class="food-section">
          <section id="burger-section" class="burger-section">
            <div class="food-sections-seperator">
              <img src="./assets/icons/burger-icon.svg" alt="Burger Icon" />
              <h2>Burger & Sandwiches</h2>
            </div>

            <section
              id="article-section--burger"
              class="article-section"
            ></section>
          </section>

          <section id="pizza-section" class="pizza-section">
            <div class="food-sections-seperator">
              <img src="./assets/icons/pizza-icon.svg" alt="Pizza Icon" />
              <h2>Pizza <span class="pizza-cm">(30cm)</span></h2>
            </div>

            <section
              id="article-section--pizza"
              class="article-section"
            ></section>
          </section>

          <section id="salad-section" class="salad-section">
            <div class="food-sections-seperator">
              <img src="./assets/icons/salad-icon.svg" alt="Salad Icon" />
              <h2>Salad</h2>
            </div>

            <section
              id="article-section--salad"
              class="article-section"
            ></section>
          </section>
        </section>
        <section id="basket-wrapper" class="basket-wrapper"></section>
      </div>

      <dialog id="confirmation-dialog" class="confirmation-dialog">
        <div class="dialog-content-wrapper">
          <button onclick="closeDialog()" class="close-confirmation-dialog-btn">
            <img src="./assets/icons/close.svg" alt="Close Icon" />
          </button>
          <img
            class="burger-truck"
            src="./assets/icons/burger-truck.svg"
            alt="Truck with a Burger Icon on it"
          />
          <div class="confirmation-dialog-text">
            <p>Order confirmed!</p>
            <p>Your food is on the way!</p>
          </div>
        </div>
      </dialog>
    </main>

    <footer>
      <div class="copyright-container">
        <img src="./assets/icons/copyright.svg" alt="Copyright Icon" />
        <p>2025 BurgerHouse</p>
      </div>
      <p>Imprint</p>
      <p>Cookie Preferences</p>
    </footer>
  </body>
</html>
